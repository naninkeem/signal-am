<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SIGNAL AM"/>
<meta name="theme-color" content="#080a0f"/>
<title>SIGNAL AM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#080a0f;color:#dde4f0;font-family:'JetBrains Mono',monospace;max-width:430px;margin:0 auto;overflow-x:hidden}
::-webkit-scrollbar{width:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp 0.35s cubic-bezier(.22,.68,0,1.2) forwards}
.pulse{animation:pulse 2s ease-in-out infinite}
input,select{outline:none;-webkit-appearance:none}
button:active{transform:scale(0.97)}
:root{
  --bg:#080a0f;--surface:#0f1117;--surfaceHigh:#161b25;
  --border:#1c2235;--accent:#e8c84a;--green:#3ecf8e;
  --red:#f96b6b;--blue:#5b8af5;--purple:#a78bfa;
  --orange:#fb923c;--muted:#3d4a5c;--text:#dde4f0;--textDim:#7a8ba0;
}
.header{padding:18px 20px 14px;border-bottom:1px solid var(--border);background:#080a0ff0;backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}
.header-row{display:flex;justify-content:space-between;align-items:flex-start}
.logo{font-size:9px;letter-spacing:.3em;color:var(--accent);font-weight:700;margin-bottom:3px}
.title{font-size:20px;font-weight:800;font-family:'Syne',sans-serif;letter-spacing:-.02em}
.time{font-size:12px;color:var(--text);font-family:'JetBrains Mono',monospace}
.date-small{font-size:9px;color:var(--muted);margin-top:2px;text-align:right}
.chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.chip{padding:3px 9px;background:var(--surfaceHigh);border:1px solid var(--border);border-radius:20px;font-size:9px;color:var(--textDim);letter-spacing:.08em}
/* 캐시 상태 배지 */
.cache-badge{padding:2px 7px;border-radius:20px;font-size:8px;letter-spacing:.06em;border:1px solid;display:inline-flex;align-items:center;gap:3px}
.cache-fresh{color:#3ecf8e;border-color:rgba(62,207,142,.3);background:rgba(62,207,142,.07)}
.cache-old{color:#e8c84a;border-color:rgba(232,200,74,.3);background:rgba(232,200,74,.07)}
.content{padding:18px 16px 100px}
.section-label{font-size:9px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::before{content:'';display:block;width:16px;height:1px;background:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.divider{height:1px;background:var(--border);margin:10px 0}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.metric-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.metric-box{background:var(--bg);border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.metric-label{font-size:8px;color:var(--muted);letter-spacing:.08em;margin-bottom:3px}
.metric-val{font-size:12px;font-weight:700}
.sent-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-bottom:14px}
.sent-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--accent),var(--green));border-radius:3px;transition:width 1.2s ease}
.stock-top{display:flex;justify-content:space-between;align-items:flex-start}
.ticker{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stock-name{font-size:10px;color:var(--muted);margin-top:2px}
.earning-badge{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(232,200,74,.1);border-radius:8px;margin-bottom:10px}
.key-point{font-size:11px;color:var(--textDim);line-height:1.6}
.risk-box{font-size:10px;color:var(--red);margin-top:8px;padding:6px 10px;background:rgba(249,107,107,.1);border-radius:8px}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:8px}
.action-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.action-text{font-size:12px;color:var(--text);line-height:1.5}
.geo-event{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.geo-event:last-child{border-bottom:none}
.geo-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.geo-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px}
.geo-impact{font-size:10px;color:var(--textDim);line-height:1.5}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
.loading-box{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.loading-text{color:var(--textDim);font-size:11px;letter-spacing:.12em;text-align:center;line-height:1.8}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#080a0f;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.04em}
.btn-ghost{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;margin-top:4px}
.btn-sm{padding:7px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--textDim);font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:.06em}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0f1117f0;backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 28px;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:48px;transition:opacity .2s}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase}
.nav-dot{width:3px;height:3px;border-radius:50%;background:var(--accent)}
.settings-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.settings-select{width:100%;background:var(--surfaceHigh);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;color-scheme:dark}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.day-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.day-row:last-child{border-bottom:none}
.day-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.day-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.error-box{padding:12px;background:rgba(249,107,107,.1);border:1px solid rgba(249,107,107,.3);border-radius:10px;font-size:11px;color:var(--red);line-height:1.6;margin-top:12px}
.bg-grid{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;height:100vh;pointer-events:none;z-index:0;background-image:linear-gradient(#1c223518 1px,transparent 1px),linear-gradient(90deg,#1c223518 1px,transparent 1px);background-size:40px 40px}
.saju-ring-wrap{position:relative;width:180px;height:180px;margin:0 auto 24px}
.saju-svg{animation:spin 20s linear infinite;position:absolute;top:0;left:0}
.saju-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.info-row{display:flex;justify-content:space-between;margin-bottom:6px}

/* 토큰 사용량 표시 */
.token-bar-wrap{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.token-bar-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.token-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.token-label{font-size:9px;color:var(--muted);white-space:nowrap}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="header">
  <div class="header-row">
    <div>
      <div class="logo">◆ SIGNAL AM</div>
      <div class="title" id="tab-title">모닝 브리핑</div>
    </div>
    <div>
      <div class="time" id="clock"></div>
      <div class="date-small" id="dateline"></div>
    </div>
  </div>
  <div class="chips" id="ticker-chips"></div>
</div>
<div class="content" id="content"></div>
<div class="nav" id="nav"></div>

<script>
// ── CONFIG
const CACHE_TTL_MS = 3 * 60 * 60 * 1000; // 3시간 캐시 (브리핑/어닝)
const SAJU_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 사주는 24시간

// ── State
const S = {
  tab: 'briefing',
  tickers: ['GOOGL','NVDA'],
  briefingData: null,
  briefingLoading: false,
  briefingError: null,
  briefingCachedAt: null,
  totalTokensUsed: parseInt(localStorage.getItem('signal_am_tokens')||'0'),
};

const TABS = [
  {id:'briefing',icon:'◈',label:'브리핑'},
  {id:'earnings',icon:'◷',label:'어닝'},
  {id:'watchlist',icon:'⊕',label:'관심'},
  {id:'saju',icon:'命',label:'사주'},
  {id:'settings',icon:'◎',label:'설정'},
];
const TAB_TITLES = {briefing:'모닝 브리핑',earnings:'어닝 캘린더',watchlist:'관심 종목',saju:'사주 타이밍',settings:'설정'};

// ── 핵심 최적화: 간결한 프롬프트 (토큰 절감)
const BRIEFING_SYS = `Korean financial analyst. Use web_search for real-time data.
Return ONLY valid JSON (no markdown, no backticks):
{"market":{"sentiment":"공포|탐욕|중립","sentimentScore":50,"vix":"18.2","dollar":"104.1","sp500Change":"+0.3%","nasdaqChange":"-0.1%","summary":"2문장 한국어"},"stocks":[{"ticker":"GOOGL","name":"알파벳","price":"178.50","change":"1.2%","changeDir":"up","signal":"관망","analystTarget":"210","upside":"17%","keyPoint":"한국어","risk":"한국어","earningDate":"2025-04-29","earningDaysLeft":30}],"watchlist":[{"ticker":"MSFT","name":"마이크로소프트","reason":"한국어","theme":"AI","change":"0.8%","changeDir":"up"}],"geopolitical":{"riskLevel":"보통","events":[{"title":"한국어","impact":"한국어","direction":"negative"}]},"actionItems":[{"priority":"high","text":"한국어"}],"portfolioSuggestion":"한국어"}`;

const SAJU_SYS = `Korean saju master + stock timing. Return ONLY valid JSON (no markdown):
{"sajuSummary":"한국어","currentEnergy":"상승기","energyScore":72,"weeklyOutlook":[{"day":"월","energy":"강","action":"매수","reason":"한국어"}],"monthTiming":"한국어","avoidDates":["한국어"],"favorableDates":["한국어"],"stockAlignment":[{"ticker":"GOOGL","alignment":"높음","reason":"한국어"}],"overallAdvice":"한국어"}`;

const EARNINGS_SYS = `Search web for upcoming earnings. Return ONLY valid JSON (no markdown):
{"earnings":[{"ticker":"GOOGL","name":"알파벳","date":"2025-04-29","daysLeft":30,"time":"장후","epsEstimate":"2.01","epsPrev":"1.89","revenueEstimate":"89.1B","analystSentiment":"매수","keyWatch":"한국어","historicalBeat":"75% 비트"}]}`;

// ── Cache 유틸
function getCacheKey(type) {
  return `signal_am_cache_${type}_${S.tickers.sort().join('_')}`;
}
function saveCache(type, data) {
  const payload = { data, savedAt: Date.now() };
  try { localStorage.setItem(getCacheKey(type), JSON.stringify(payload)); } catch(e){}
}
function loadCache(type, ttl = CACHE_TTL_MS) {
  try {
    const raw = localStorage.getItem(getCacheKey(type));
    if (!raw) return null;
    const { data, savedAt } = JSON.parse(raw);
    if (Date.now() - savedAt > ttl) return null;
    return { data, savedAt };
  } catch(e) { return null; }
}
function clearCache(type) {
  try { localStorage.removeItem(getCacheKey(type)); } catch(e){}
}
function formatAge(ms) {
  const m = Math.floor(ms / 60000);
  if (m < 1) return '방금';
  if (m < 60) return `${m}분 전`;
  return `${Math.floor(m/60)}시간 전`;
}

// ── API (Vercel 프록시 경유 → 키 브라우저 노출 없음)
async function callClaude(system, user, useSearch=true) {
  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1200,
    system,
    messages: [{role:'user',content:user}],
  };
  if (useSearch) body.tools = [{type:'web_search_20250305',name:'web_search'}];
  const res = await fetch('/api/proxy', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);

  // 토큰 사용량 추적
  if (data.usage) {
    const used = (data.usage.input_tokens||0) + (data.usage.output_tokens||0);
    S.totalTokensUsed += used;
    localStorage.setItem('signal_am_tokens', S.totalTokensUsed);
  }

  const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

// ── Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateline').textContent = now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
setInterval(updateClock,1000); updateClock();

// ── Helpers
function pill(text,color,bg,size=10){
  return `<span class="pill" style="color:${color};background:${bg};font-size:${size}px">${text}</span>`;
}
function signalPill(s){
  const m={매수:['#3ecf8e','rgba(62,207,142,.1)'],관망:['#e8c84a','rgba(232,200,74,.1)'],주의:['#fb923c','rgba(251,146,60,.1)'],매도:['#f96b6b','rgba(249,107,107,.1)']};
  const [c,b]=m[s]||['#3d4a5c','#161b25']; return pill(s,c,b);
}
function dc(d){return d==='up'?'#3ecf8e':d==='down'?'#f96b6b':'#3d4a5c'}
function rc(r){
  const m={낮음:['#3ecf8e','rgba(62,207,142,.1)'],보통:['#e8c84a','rgba(232,200,74,.1)'],높음:['#fb923c','rgba(251,146,60,.1)'],매우높음:['#f96b6b','rgba(249,107,107,.1)']};
  return m[r]||['#3d4a5c','#161b25'];
}
function tokenColor(n) {
  if (n < 50000) return '#3ecf8e';
  if (n < 150000) return '#e8c84a';
  return '#f96b6b';
}

// ── Nav
function renderNav() {
  document.getElementById('nav').innerHTML = TABS.map(t=>`
    <div class="nav-item" style="opacity:${S.tab===t.id?1:0.35}" onclick="setTab('${t.id}')">
      <div class="nav-icon" style="color:${S.tab===t.id?'#e8c84a':'#7a8ba0'};font-family:${t.id==='saju'?'serif':'inherit'}">${t.icon}</div>
      <div class="nav-label" style="color:${S.tab===t.id?'#e8c84a':'#3d4a5c'}">${t.label}</div>
      ${S.tab===t.id?'<div class="nav-dot"></div>':''}
    </div>
  `).join('');
  document.getElementById('tab-title').textContent = TAB_TITLES[S.tab]||'';

  // 캐시 상태 배지
  const cached = loadCache('briefing');
  const age = cached ? Date.now() - cached.savedAt : null;
  const badgeHtml = cached
    ? `<span class="cache-badge ${age < 60*60*1000 ? 'cache-fresh' : 'cache-old'}">◉ ${formatAge(age)}</span>`
    : '';
  document.getElementById('ticker-chips').innerHTML =
    S.tickers.map(t=>`<div class="chip">${t}</div>`).join('') + badgeHtml;
}

function setTab(id){S.tab=id;renderNav();renderContent();}




// ── Briefing (캐시 우선)
function renderBriefing(){
  if (S.briefingLoading) return `<div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">웹 검색 중...<br/>최신 시장 데이터 수집 & 분석</div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center">
      ${S.tickers.concat(['VIX','CNN F&G']).map((t,i)=>`<div class="chip" style="animation:pulse 1.5s ${i*0.3}s ease-in-out infinite">${t}</div>`).join('')}
    </div>
  </div>`;

  if (!S.briefingData) {
    const cached = loadCache('briefing');
    if (cached) {
      // 캐시 있으면 바로 사용
      S.briefingData = cached.data;
      S.briefingCachedAt = cached.savedAt;
    } else {
      return `<div class="slide-up">
        <div class="card" style="background:linear-gradient(135deg,#0f1117,#161b25)">
          <div style="font-size:22px;margin-bottom:8px">📡</div>
          <div style="font-size:14px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:6px">오늘의 브리핑 준비 완료</div>
          <div style="font-size:12px;color:#7a8ba0;line-height:1.7;margin-bottom:16px">AI가 실시간 웹검색으로<br/><span style="color:#e8c84a">${S.tickers.join('·')}</span> 맞춤 분석을 만들어줄게.</div>
          <button class="btn-primary" onclick="loadBriefing()">브리핑 생성하기</button>
        </div>
        ${S.briefingError?`<div class="error-box">${S.briefingError}</div>`:''}
      </div>`;
    }
  }

  const m=S.briefingData.market;
  const sc=m.sentimentScore;
  const sentColor=sc<30?'#f96b6b':sc<55?'#e8c84a':'#3ecf8e';
  const cacheAge = S.briefingCachedAt ? Date.now() - S.briefingCachedAt : null;

  const stocksHtml=(S.briefingData.stocks||[]).map(s=>`
    <div class="card" style="border-color:${dc(s.changeDir)}25">
      <div class="stock-top">
        <div><div class="ticker">${s.ticker}</div><div class="stock-name">${s.name}</div></div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace">$${s.price}</div>
          <div style="font-size:11px;color:${dc(s.changeDir)};font-weight:600">${s.changeDir==='up'?'▲':s.changeDir==='down'?'▼':'—'} ${s.change}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:10px;color:#3d4a5c">목표가 <span style="color:#dde4f0">$${s.analystTarget}</span>${s.upside?`<span style="color:#3ecf8e;margin-left:6px">+${s.upside}</span>`:''}</div>
        ${signalPill(s.signal)}
      </div>
      ${s.earningDaysLeft!=null?`<div class="earning-badge"><div class="pulse" style="width:6px;height:6px;border-radius:50%;background:#e8c84a;flex-shrink:0"></div><div style="font-size:10px;color:#e8c84a">어닝 <span style="font-weight:700">D-${s.earningDaysLeft}</span>${s.earningDate?`<span style="color:#7a8ba0;margin-left:6px">(${s.earningDate})</span>`:''}</div></div>`:''}
      <div class="key-point">${s.keyPoint}</div>
      ${s.risk?`<div class="risk-box">⚠ ${s.risk}</div>`:''}
    </div>`).join('');

  const actionHtml=(S.briefingData.actionItems||[]).map(a=>{
    const [c,b]=a.priority==='high'?['#f96b6b','rgba(249,107,107,.1)']:a.priority==='medium'?['#e8c84a','rgba(232,200,74,.1)']:['#3d4a5c','#161b25'];
    return `<div class="action-item" style="background:${b};border:1px solid ${c}25"><div class="action-dot" style="background:${c}"></div><div class="action-text">${a.text}</div></div>`;
  }).join('');

  const geo=S.briefingData.geopolitical;
  const [rcol,rbg]=rc(geo?.riskLevel);
  const geoHtml=(geo?.events||[]).map(e=>{
    const gcol=e.direction==='positive'?'#3ecf8e':e.direction==='negative'?'#f96b6b':'#3d4a5c';
    return `<div class="geo-event"><div class="geo-dot" style="background:${gcol}"></div><div><div class="geo-title">${e.title}</div><div class="geo-impact">${e.impact}</div></div></div>`;
  }).join('');

  return `<div class="slide-up">

async function loadBriefing(force=false){
  // 캐시 유효하면 스킵 (force=false일 때)
  if (!force) {
    const cached = loadCache('briefing');
    if (cached) {
      S.briefingData = cached.data;
      S.briefingCachedAt = cached.savedAt;
      renderContent(); return;
    }
  }
  S.briefingLoading=true; S.briefingError=null; S.tab='briefing';
  renderNav(); renderContent();
  try {
    const today = new Date().toISOString().split('T')[0];
    S.briefingData = await callClaude(
      BRIEFING_SYS,
      `Date:${today}. Tickers:${S.tickers.join(',')}. Return JSON only.`
    );
    S.briefingCachedAt = Date.now();
    saveCache('briefing', S.briefingData);
  } catch(e){ S.briefingError=e.message; }
  S.briefingLoading=false; renderContent();
}

let sajuData=null,sajuLoading=false,sajuError=null,sajuStep='input',sajuBirth='',sajuTime='';
async function analyzeSaju(){
  if(!sajuBirth)return;
  // 사주는 같은 생년월일이면 캐시 재사용
  const sajuKey = `signal_am_saju_${sajuBirth}_${sajuTime}_${S.tickers.sort().join('_')}`;
  try {
    const raw = localStorage.getItem(sajuKey);
    if (raw) {
      const { data, savedAt } = JSON.parse(raw);
      if (Date.now() - savedAt < SAJU_CACHE_TTL_MS) {
        sajuData=data; sajuStep='result'; renderContent(); return;
      }
    }
  } catch(e){}
  sajuLoading=true;sajuError=null;renderContent();
  try{
    const today=new Date().toISOString().split('T')[0];
    sajuData=await callClaude(SAJU_SYS,`생년월일:${sajuBirth}, 생시:${sajuTime||'미입력'}, 오늘:${today}, 종목:${S.tickers.join(',')}. JSON만.`,false);
    sajuStep='result';
    try { localStorage.setItem(sajuKey, JSON.stringify({data:sajuData,savedAt:Date.now()})); } catch(e){}
  }catch(e){sajuError=e.message;}
  sajuLoading=false;renderContent();
}

}
function applySettings(){
  S.tickers=settingsInput.split(/[,\s]+/).filter(Boolean);
  clearCache('briefing'); clearCache('earnings');
  S.briefingData=null; earningsData=null;
  renderNav(); loadBriefing(true);
}

// ── Main render
function renderContent(){
  const el=document.getElementById('content');
  const map={briefing:renderBriefing,earnings:renderEarnings,watchlist:renderWatchlist,saju:renderSaju,settings:renderSettings};
  el.innerHTML=(map[S.tab]||renderBriefing)();
}

// ── Init (캐시 로드 시도)
(function init(){
  const cached = loadCache('briefing');
  if (cached) { S.briefingData=cached.data; S.briefingCachedAt=cached.savedAt; }
  renderNav(); renderContent();
})();
</script>
</body>
